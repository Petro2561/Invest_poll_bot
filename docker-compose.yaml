  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-bot-quiz
    restart: unless-stopped
    network_mode: "host"  # Используем host network для доступа к существующим контейнерам
    command: python main.py
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      # Примечание: DATABASE_URL должен указывать на localhost:5432
      # Например: postgresql+asyncpg://tg_user:tg_pass@localhost:5432/quizbot


  admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admin-panel-quiz
    restart: unless-stopped
    network_mode: "host"  # Используем host network для доступа к существующим контейнерам
    command: >
      python -m uvicorn bot.admin.main:app --host 0.0.0.0 --port 8001
    volumes:
      - .:/app
    env_file:
      - .env